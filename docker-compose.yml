services:
  # PostgreSQL with the pgvector extension (durable embeddings store)
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: compare
      POSTGRES_PASSWORD: compare
      POSTGRES_DB: compare
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compare -d compare"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    networks:
      - app-network

  # Redis (chat session memory)
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    networks:
      - app-network

  # Ollama (local models)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    networks:
      - app-network

  # Pulls the Ollama models listed in models.yaml
  model-puller:
    image: alpine:3.20
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      MODELS_CONFIG: /config/models.yaml
      ENABLE_AUTO_PULL: "true"
      PULL_RETRIES: "5"
      PULL_SLEEP_SECS: "3"
    volumes:
      - ./config:/config:ro
      - ./scripts/pull-models.sh:/pull-models.sh:ro
    entrypoint: ["/bin/sh", "-lc", "apk add --no-cache dos2unix >/dev/null 2>&1 || true; dos2unix /pull-models.sh >/dev/null 2>&1 || true; chmod +x /pull-models.sh; /pull-models.sh"]
    restart: "no"
    networks:
      - app-network

  # Backend API
  api:
    build: ./backend
    environment:
      MODELS_CONFIG: /config/models.yaml
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      HOST: 0.0.0.0
      PORT: 8080
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      # Persistence
      VECTOR_BACKEND: ${VECTOR_BACKEND:-pgvector}
      SESSION_BACKEND: ${SESSION_BACKEND:-redis}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://compare:compare@postgres:5432/compare}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Optional: a running Floating Prompts API to load managed system prompts.
      # Unset disables the feature. From a container, reach the host with
      # host.docker.internal (or attach FP to this compose network).
      FLOATING_PROMPTS_URL: ${FLOATING_PROMPTS_URL:-}
      # Provider keys
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-${GOOGLE_API_KEY}}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      COHERE_API_KEY: ${COHERE_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
    volumes:
      - ./config:/config:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      model-puller:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app-network

  # Frontend UI
  ui:
    build: ./ui
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      INTERNAL_API_ORIGIN: http://api:8080
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  ollama:
    driver: local
  postgres:
    driver: local
  redis:
    driver: local
